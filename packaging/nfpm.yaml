# nfpm manifest for the Linux .deb (built by .github/workflows/release.yml).
# VERSION and ARCH are injected as environment variables by the workflow;
# binaries are pre-staged under packaging/stage/ by the workflow's stage step.
#
# Layout mirrors the per-user install (`make install`): only `paniolo` lands
# on PATH; the helpers live in the private libexec dir, found via
# `system_libexec_dir()` in cli/src/daemons.rs.
#
# The agent skills (skills/<name>/SKILL.md) ship to /usr/share/paniolo/skills,
# the system entry in `skills_dirs()` (cli/src/skills.rs) that `paniolo skill`
# reads.
#
# Not packaged (still done per-user by `paniolo setup`): group membership
# (dialout etc.), the zigplug uv tool, and netbootd-bpf-helper (macOS-only).

name: paniolo
arch: ${ARCH}
version: ${VERSION}
platform: linux
section: utils
priority: optional
maintainer: Curtis Galloway <4055365+curtisgalloway@users.noreply.github.com>
homepage: https://github.com/curtisgalloway/paniolo
license: Apache-2.0
description: |
  Agent-controlled target machine wrangler — distributed bring-up control over SSH.
  Installs the paniolo CLI plus its helper daemons (hdmicap, serialcap,
  netbootd, cambrionix, hidrig, ch9329, usbhub, shellyplug), the
  linuxocr OCR helper, and the bundled agent skills (`paniolo skill`).
  Run `paniolo setup` once per user for group membership and the
  optional zigplug Zigbee helper.
depends:
  - libudev1
  - python3
recommends:
  - tesseract-ocr
# Advisory post-install notice: running daemons keep the old binary until
# restarted (`paniolo daemons restart --stale`). Never reaps daemons — they are
# per-user processes, not packaged services. See packaging/scripts/postinstall.sh.
scripts:
  postinstall: packaging/scripts/postinstall.sh
contents:
  - src: packaging/stage/bin/paniolo
    dst: /usr/bin/paniolo
    file_info:
      mode: 0o755
  - src: packaging/stage/libexec/*
    dst: /usr/libexec/paniolo/bin/
    file_info:
      mode: 0o755
  # Bundled agent skills — read straight from the repo tree (the workflow
  # builds inside the checkout). One explicit file→file entry per skill: a
  # glob (`skills/*/SKILL.md`) maps by basename, which would collide all three
  # SKILL.md at one dst. Add a line when you add a skill (the release
  # smoke-test checks the paniolo one).
  - src: skills/paniolo/SKILL.md
    dst: /usr/share/paniolo/skills/paniolo/SKILL.md
    file_info:
      mode: 0o644
  - src: skills/kvm-puppeting/SKILL.md
    dst: /usr/share/paniolo/skills/kvm-puppeting/SKILL.md
    file_info:
      mode: 0o644
  - src: skills/usbhub/SKILL.md
    dst: /usr/share/paniolo/skills/usbhub/SKILL.md
    file_info:
      mode: 0o644
  - src: LICENSE
    dst: /usr/share/doc/paniolo/LICENSE
