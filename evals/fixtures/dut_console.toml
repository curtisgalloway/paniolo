[targets.dut]

[[targets.dut.serial]]
name = "console"
device = "/dev/cu.usbserial-AA"
baud = 115200
# DTR is wired to the J2 power-button header on this interface, so `serial dtr`
# / `serial reset` may drive it (the s9 scenario). DTR control is opt-in.
power_button = true
# paniolo lab — managed by the `paniolo` CLI; hand-edits are preserved

