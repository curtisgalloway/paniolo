id = "c8"
title = "Config-vs-reality check"
tier = "t1"
core = false
conditions = ["cold", "warm", "preloaded"]
capabilities = ["doctor"]
goal = """
Is target `pico`'s paniolo configuration consistent with what's actually
plugged into this machine right now? Tell me which configured devices are
present and which are missing.
"""
traps = [
  "use `paniolo doctor` (probes channels against reality) rather than re-deriving by hand",
]
reference = [
  'paniolo doctor',
]
seed = "pico_absent_devices.toml"

[grader]
type = "judge"
