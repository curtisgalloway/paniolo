id = "c4"
title = "Inspect the configured lab"
tier = "t1"
core = false
conditions = ["cold", "warm", "preloaded"]
capabilities = ["config"]
goal = """
What targets are configured in paniolo on this machine, and what hardware
(network, serial, power, etc.) does each one have?
"""
traps = [
  "baseline inspection-discovery: find `config show` / `target show`",
]
reference = [
  'paniolo config show',
]
seed = "two_targets.toml"

[grader]
type = "judge"
