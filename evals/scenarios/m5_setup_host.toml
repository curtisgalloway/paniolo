id = "m5"
title = "Rebuild and install paniolo's Rust binaries on a control host"
tier = "t0"
core = false
conditions = ["cold", "warm", "preloaded"]
capabilities = ["setup", "host"]
goal = """
I edited paniolo's Rust source. Rebuild and install just the Rust binaries on the
control host `bench1` — I don't need the OCR / zigplug extras rebuilt. List the
exact command(s) you would run.
"""
traps = [
  "`paniolo setup` builds + installs from a source clone; `--rust-only` skips the OCR / setuid / zigplug steps",
  "`--host bench1` provisions that lab host over SSH (the source + CLI must already be there); it is NOT a per-target command",
]
reference = [
  'paniolo setup --rust-only --host bench1',
]
seed = ""

[grader]
type = "judge"
