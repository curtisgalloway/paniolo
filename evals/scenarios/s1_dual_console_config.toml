id = "s1"
title = "Configure dual consoles + DTR opt-in"
tier = "t1"
core = false
conditions = ["cold", "warm", "preloaded"]
capabilities = ["serial", "power"]
goal = """
Set up target `dut` with two serial consoles: a main `console` on
`/dev/cu.usbserial-AA` at 115200 baud whose CTS line reports power state, and a
`bmc` console on `/dev/cu.usbserial-BB` at 9600 baud. The main `console` has its
DTR line wired to the board's power button — enable DTR/power-button control on
it.
"""
traps = [
  "named interfaces: `console` and `bmc` are distinct, each with its own baud",
  "`--sense cts` records the power-sense signal on the interface",
  "DTR control is opt-in per interface via `--power-button` (on `serial add`/`set`); it is NOT implied by `--sense`, and `serial dtr`/`reset` error on an interface that lacks it",
]
reference = [
  'paniolo target add dut',
  'paniolo serial add console -t dut --device /dev/cu.usbserial-AA --sense cts --power-button',
  'paniolo serial add bmc -t dut --device /dev/cu.usbserial-BB --baud 9600',
]
seed = ""

[grader]
type = "t1_config"
allowlist_violation_fails = true
[[grader.assert]]
path = "targets.dut.serial[name=console].baud"
equals = 115200
[[grader.assert]]
path = "targets.dut.serial[name=console].power_sense_signal"
equals = "cts"
[[grader.assert]]
path = "targets.dut.serial[name=console].power_button"
equals = true
[[grader.assert]]
path = "targets.dut.serial[name=bmc].baud"
equals = 9600
