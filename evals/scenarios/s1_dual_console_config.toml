id = "s1"
title = "Configure dual consoles + DTR default"
tier = "t1"
core = false
conditions = ["cold", "warm", "preloaded"]
capabilities = ["serial", "power"]
goal = """
Set up target `dut` with two serial consoles: a main `console` on
`/dev/cu.usbserial-AA` at 115200 baud whose CTS line reports power state, and a
`bmc` console on `/dev/cu.usbserial-BB` at 9600 baud. Make the main `console`
the default interface that DTR/power-button commands act on.
"""
traps = [
  "named interfaces: `console` and `bmc` are distinct, each with its own baud",
  "`--sense cts` records the power-sense signal on the interface",
  "the DTR/power default is the power channel's `serial-interface`, set via `power set`",
]
reference = [
  'paniolo target add dut',
  'paniolo serial add console -t dut --device /dev/cu.usbserial-AA --sense cts',
  'paniolo serial add bmc -t dut --device /dev/cu.usbserial-BB --baud 9600',
  'paniolo power set -t dut --serial-interface console',
]
seed = ""

[grader]
type = "t1_config"
allowlist_violation_fails = true
[[grader.assert]]
path = "targets.dut.serial[name=console].baud"
equals = 115200
[[grader.assert]]
path = "targets.dut.serial[name=console].power_sense_signal"
equals = "cts"
[[grader.assert]]
path = "targets.dut.serial[name=bmc].baud"
equals = 9600
[[grader.assert]]
path = "targets.dut.power.serial_interface"
equals = "console"
