id = "s9"
title = "Soft reset / hard power-off over the J2 wire"
tier = "t0"
core = false
conditions = ["cold", "warm", "preloaded"]
capabilities = ["serial", "power"]
goal = """
`dut` is wedged and won't respond on the console. Do a soft reset by driving the
power button over the FTDI wire on the J2 header; if that doesn't bring it back,
force a hard power-off. List the exact paniolo commands you would run.
"""
traps = [
  "DTR pulse width carries the semantic: ≤500 ms is a soft button event, ≥3000 ms is a hard PMIC power-off",
  "`serial reset` is the brief soft pulse; `serial dtr --ms 3000` is the hard off",
  "DTR control is opt-in: it works here only because `dut`'s console interface declares `power_button = true` (set via `serial set --power-button`); a target without it errors",
]
reference = [
  'paniolo serial reset dut          # brief DTR pulse = soft power-button press',
  'paniolo serial dtr dut --ms 3000   # >=3000 ms = hard PMIC power-off',
]
seed = "dut_console.toml"

[grader]
type = "judge"
