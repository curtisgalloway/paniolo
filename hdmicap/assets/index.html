<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>paniolo · video + serial</title>
  <link rel="stylesheet" href="/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: #000; display: flex; flex-direction: column;
           font: 12px ui-monospace, Menlo, monospace; color: #ddd; }
    #video { flex: 1 1 auto; min-height: 0; position: relative;
             display: flex; align-items: center; justify-content: center; }
    #video img { max-width: 100%; max-height: 100%; object-fit: contain; }
    #vstatus { position: absolute; top: 8px; right: 12px; color: #0f0;
               background: rgba(0,0,0,.6); padding: 4px 8px; border-radius: 4px; }
    #sidebar { flex: 0 0 auto; display: flex; flex-direction: column; min-height: 0; }
    #bar { flex: 0 0 24px; background: #111; display: flex; align-items: center;
           gap: 14px; padding: 0 12px; border-top: 1px solid #333; }
    #bar .label { color: #888; }
    #sstatus { color: #fa0; flex: 1 1 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #layoutbtn { margin-left: auto; cursor: pointer; background: none; border: 1px solid #444;
                 border-radius: 3px; color: #888; font: 11px ui-monospace, monospace;
                 padding: 1px 6px; }
    #layoutbtn:hover { color: #cdf; border-color: #46c; }
    #serial { flex: 0 0 40vh; background: #000; min-height: 0; display: flex; }
    .serial-pane { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; }
    .serial-pane + .serial-pane { border-left: 1px solid #333; }
    .pane-bar { flex: 0 0 20px; background: #111; border-bottom: 1px solid #222;
                display: flex; align-items: center; padding: 0 8px; gap: 8px; font-size: 11px; }
    .pane-name { color: #888; }
    .pane-status { color: #fa0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pane-term { flex: 1 1 0; min-height: 0; padding: 4px 6px; }
    #videobtns { position: absolute; top: 8px; left: 12px; z-index: 3;
                 display: flex; gap: 6px; }
    /* Fixed widths so a button's strip position never shifts when its label
       changes (Capture input <-> Capturing, the toggle's on/off state). */
    #videobtns button { cursor: pointer; font: 12px ui-monospace, monospace;
                        padding: 4px 10px; border-radius: 4px; text-align: center;
                        white-space: nowrap; }
    #ocrbtn { color: #cdf; background: rgba(0,0,0,.6); border: 1px solid #46c;
              min-width: 64px; }
    #ocrbtn:hover { background: rgba(40,80,160,.7); }
    #kvmbtn { color: #cfc; background: rgba(0,0,0,.6); border: 1px solid #4a4;
              min-width: 150px; display: none; }
    #kvmbtn:hover { background: rgba(30,80,30,.7); }
    #kvmbtn.on { color: #000; background: #4d4; border-color: #4d4; font-weight: bold; }
    /* Power: an on/off toggle switch + a separate cycle button. */
    #pwrtoggle { color: #fca; background: rgba(0,0,0,.6); border: 1px solid #840;
                 min-width: 128px; display: none; align-items: center;
                 justify-content: center; gap: 8px; }
    #pwrtoggle:hover { background: rgba(80,30,0,.7); }
    #pwrlabel { color: #fca; }
    #pwrtrack { width: 30px; height: 14px; border-radius: 7px; background: #722;
                position: relative; flex: 0 0 auto; transition: background .15s; }
    #pwrtoggle.on #pwrtrack { background: #2a7e2a; }
    #pwrtoggle.unknown #pwrtrack { background: #6a5500; }
    #pwrknob { position: absolute; top: 2px; left: 2px; width: 10px; height: 10px;
               border-radius: 50%; background: #eee; transition: left .15s; }
    #pwrtoggle.on #pwrknob { left: 18px; }
    #pwrtoggle.unknown #pwrknob { left: 9px; }
    /* fixed-width state label so ON<->OFF never nudges the switch */
    #pwrstate { min-width: 24px; text-align: left; font-weight: bold; color: #e88; }
    #pwrtoggle.on #pwrstate { color: #6e6; }
    #pwrtoggle.unknown #pwrstate { color: #db4; }
    #pwrcyclebtn { color: #fca; background: rgba(0,0,0,.6); border: 1px solid #840;
                   min-width: 90px; display: none; }
    #pwrcyclebtn:hover { background: rgba(80,30,0,.7); }
    #pwrtoggle[disabled], #pwrcyclebtn[disabled] { opacity: .5; cursor: default; }
    #kvmstatus { position: absolute; bottom: 8px; left: 12px; z-index: 3;
                 color: #4d4; background: rgba(0,0,0,.6); padding: 3px 8px;
                 border-radius: 4px; display: none; }
    #video.capturing { cursor: crosshair; outline: 2px solid #4d4; outline-offset: -2px; }
    #video img { -webkit-user-drag: none; user-select: none; }
    #kvmhint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
               z-index: 3; color: #cfc; background: rgba(0,0,0,.55); padding: 4px 12px;
               border-radius: 4px; font-size: 12px; pointer-events: none; display: none; }
    #video.kvm-available:not(.capturing) #kvmhint { display: block; }
    #pwrmodal { position: absolute; inset: 0; z-index: 10; display: none;
                align-items: center; justify-content: center;
                background: rgba(0,0,0,.7); }
    #pwrmodal.show { display: flex; }
    #pwrbox { background: #111; border: 1px solid #840; border-radius: 8px;
              padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
              color: #ddd; font: 13px ui-monospace, monospace; max-width: 300px; }
    #pwrbox p { color: #fca; }
    #pwrbtns { display: flex; gap: 10px; justify-content: flex-end; }
    #pwrcancel { cursor: pointer; background: none; border: 1px solid #555;
                 border-radius: 4px; color: #aaa; padding: 4px 14px; font: inherit; }
    #pwrcancel:hover { border-color: #888; color: #ddd; }
    #pwrconfirm { cursor: pointer; background: rgba(80,30,0,.8); border: 1px solid #a60;
                  border-radius: 4px; color: #fca; padding: 4px 14px; font: inherit; }
    #pwrconfirm:hover { background: rgba(120,50,0,.9); }
    #ocrpanel { position: absolute; inset: 8px 8px auto 8px; max-height: 70%; z-index: 4;
                display: none; flex-direction: column; background: rgba(0,0,0,.92);
                border: 1px solid #46c; border-radius: 6px; }
    #ocrpanel.show { display: flex; }
    #ocrhead { display: flex; justify-content: space-between; align-items: center;
               padding: 6px 10px; border-bottom: 1px solid #333; color: #cdf; }
    #ocrclose { cursor: pointer; color: #f88; padding: 0 6px; font-size: 16px; }
    #ocrtext { margin: 0; padding: 10px; overflow: auto; white-space: pre-wrap;
               color: #dfd; font: 12px ui-monospace, monospace; }

    /* right-panel layout */
    body.layout-right { flex-direction: row; }
    body.layout-right #video { flex: 1 1 0; min-width: 0; min-height: 0; }
    body.layout-right #sidebar { flex: 0 0 380px; min-width: 380px; min-height: 0;
                                  border-top: none; border-left: 1px solid #333; }
    body.layout-right #bar { border-top: none; border-bottom: 1px solid #333; }
    body.layout-right #serial { flex: 1 1 0; min-height: 0; flex-direction: column; }
    body.layout-right .serial-pane + .serial-pane { border-left: none; border-top: 1px solid #333; }
  </style>
</head>
<body>
  <div id="video">
    <img id="feed" src="/preview" alt="HDMI capture feed" draggable="false">
    <div id="kvmhint">⌨ Use “Capture input” to control the target</div>
    <div id="videobtns">
      <button id="ocrbtn">⌕ OCR</button>
      <button id="kvmbtn">⌨ Capture input</button>
      <button id="pwrtoggle" title="Target power"><span id="pwrlabel">Power</span><span id="pwrtrack"><span id="pwrknob"></span></span><span id="pwrstate">—</span></button>
      <button id="pwrcyclebtn">⟳ Cycle</button>
    </div>
    <div id="vstatus">connecting…</div>
    <div id="kvmstatus"></div>
    <div id="ocrpanel">
      <div id="ocrhead"><span id="ocrtitle">OCR</span><span id="ocrclose">×</span></div>
      <pre id="ocrtext"></pre>
    </div>
    <div id="pwrmodal">
      <div id="pwrbox">
        <p id="pwrmsg">Power cycle the target?</p>
        <div id="pwrbtns">
          <button id="pwrcancel">Cancel</button>
          <button id="pwrconfirm">Confirm</button>
        </div>
      </div>
    </div>
  </div>
  <div id="sidebar">
    <div id="bar">
      <span class="label">serial</span>
      <span id="sstatus">disconnected</span>
      <button id="layoutbtn" title="Toggle serial panel position"></button>
    </div>
    <div id="serial"></div>
  </div>

  <script src="/xterm.js"></script>
  <script src="/xterm-addon-fit.js"></script>
  <script>
    // ── layout toggle ──
    const layoutBtn = document.getElementById('layoutbtn');
    const LAYOUT_KEY = 'paniolo-serial-layout';
    const allFits = [];
    function fitAll() { allFits.forEach(f => { try { f.fit(); } catch (e) {} }); }
    function setLayout(layout) {
      const right = layout === 'right';
      document.body.classList.toggle('layout-right', right);
      layoutBtn.textContent = right ? 'serial ↓ bottom' : 'serial → right';
      localStorage.setItem(LAYOUT_KEY, layout);
      setTimeout(fitAll, 50);
    }
    layoutBtn.onclick = () =>
      setLayout(document.body.classList.contains('layout-right') ? 'bottom' : 'right');
    setLayout(localStorage.getItem(LAYOUT_KEY) || 'bottom');

    window.addEventListener('resize', fitAll);

    // ── video: poll signal/resolution from this (hdmicap) daemon ──
    const vimg = document.getElementById('feed');
    const vst  = document.getElementById('vstatus');
    function pollVideo() {
      fetch('/status').then(r => r.json()).then(d => {
        vst.textContent = d.signal + ' · ' + d.width + '×' + d.height;
        vst.style.color = d.signal === 'stable' ? '#0f0' : '#fa0';
      }).catch(() => { vst.textContent = 'daemon unreachable'; vst.style.color = '#f44'; });
    }
    pollVideo();
    setInterval(pollVideo, 2000);
    vimg.onerror = () => { vst.textContent = 'stream error — reload'; vst.style.color = '#f44'; };

    // ── OCR: run Apple Vision on the current frame via the /ocr endpoint ──
    const ocrPanel = document.getElementById('ocrpanel');
    const ocrText = document.getElementById('ocrtext');
    const ocrTitle = document.getElementById('ocrtitle');
    document.getElementById('ocrclose').onclick = () => ocrPanel.classList.remove('show');
    document.getElementById('ocrbtn').onclick = () => {
      ocrPanel.classList.add('show');
      ocrTitle.textContent = 'OCR — reading…';
      ocrText.textContent = '';
      fetch('/ocr')
        .then(r => r.text().then(t => ({ ok: r.ok, t })))
        .then(({ ok, t }) => {
          ocrTitle.textContent = ok ? 'OCR' : 'OCR — error';
          ocrText.textContent = ok ? (t.trim() || '(no text detected)') : t;
        })
        .catch(e => { ocrTitle.textContent = 'OCR — error'; ocrText.textContent = String(e); });
    };

    // ── Power: an on/off toggle switch + a separate cycle button, each
    // confirmed before acting. Availability and live state come from GET /power,
    // which performs NO action — so merely loading the page never toggles the
    // target (the action endpoints /power-on|off|cycle are POST-only). The
    // controls hide when no target is configured (501). The toggle is polled so
    // it tracks the real rail even when power is changed elsewhere.
    const pwrToggle = document.getElementById('pwrtoggle');
    const pwrCycleBtn = document.getElementById('pwrcyclebtn');
    const pwrModal = document.getElementById('pwrmodal');
    const pwrMsg = document.getElementById('pwrmsg');
    const pwrConfirm = document.getElementById('pwrconfirm');
    const pwrStateLabel = document.getElementById('pwrstate');
    let powerState = 'unknown', pwrAction = null, pwrBusy = false;

    function renderPower() {
      pwrToggle.classList.toggle('on', powerState === 'on');
      pwrToggle.classList.toggle('unknown', powerState !== 'on' && powerState !== 'off');
      pwrStateLabel.textContent = powerState === 'on' ? 'ON' : powerState === 'off' ? 'OFF' : '—';
      pwrToggle.title = 'Target power: ' + powerState +
        (powerState === 'on' ? ' — click to turn off'
          : powerState === 'off' ? ' — click to turn on' : '');
    }
    function refreshPower() {
      if (pwrBusy) return; // don't poll cambrionix while an action holds the port
      fetch('/power').then(r => {
        if (r.status === 501) { // no target configured — hide power controls
          pwrToggle.style.display = 'none';
          pwrCycleBtn.style.display = 'none';
          return;
        }
        pwrToggle.style.display = 'inline-flex';
        pwrCycleBtn.style.display = 'inline-block';
        return r.text().then(t => { powerState = t.trim() || 'unknown'; renderPower(); });
      }).catch(() => {});
    }
    refreshPower();
    setInterval(refreshPower, 5000);

    function askPower(msg, confirmLabel, fn) {
      pwrMsg.textContent = msg;
      pwrConfirm.textContent = confirmLabel;
      pwrAction = fn;
      pwrModal.classList.add('show');
    }
    document.getElementById('pwrcancel').onclick = () => { pwrModal.classList.remove('show'); pwrAction = null; };
    pwrConfirm.onclick = () => {
      pwrModal.classList.remove('show');
      const fn = pwrAction; pwrAction = null;
      if (fn) fn();
    };
    function doPower(endpoint) {
      pwrBusy = true;
      pwrToggle.disabled = pwrCycleBtn.disabled = true;
      fetch(endpoint, { method: 'POST' })
        .then(r => { if (!r.ok) r.text().then(t => console.error(endpoint, t)); })
        .catch(e => console.error(e))
        .finally(() => {
          pwrToggle.disabled = pwrCycleBtn.disabled = false;
          pwrBusy = false;
          setTimeout(refreshPower, 1500); // let the rail settle, then re-read
        });
    }
    pwrToggle.onclick = () => {
      if (powerState === 'on') askPower('Power OFF the target?', 'Power off', () => doPower('/power-off'));
      else askPower('Power ON the target?', 'Power on', () => doPower('/power-on'));
    };
    pwrCycleBtn.onclick = () => askPower('Power cycle the target?', 'Power cycle', () => doPower('/power-cycle'));

    // ── serial: xterm.js panes fed by serialcap WebSocket (cross-port) ──
    // ?serial=PORT or ?serialws=URL override the default serialcap location.
    // ?interface=NAME locks to a single interface (single-pane mode).
    // Without ?interface, all daemon interfaces get their own pane side-by-side.
    const params = new URLSearchParams(location.search);
    const serialPort = params.get('serial') || '8724';
    const baseWsUrl = params.get('serialws') ||
                      ('ws://' + location.hostname + ':' + serialPort + '/stream');
    const httpBase = baseWsUrl.replace(/^ws/, 'http').replace(/\/stream.*$/, '');
    const singleInterface = params.get('interface') || null;

    const sst = document.getElementById('sstatus');
    const serialEl = document.getElementById('serial');

    function wsUrlFor(iface) {
      if (!iface) return baseWsUrl;
      const sep = baseWsUrl.includes('?') ? '&' : '?';
      return baseWsUrl + sep + 'interface=' + encodeURIComponent(iface);
    }

    function openTerminal(ifaceName, termDiv, statusEl) {
      const term = new Terminal({
        fontSize: 13, cursorBlink: true, scrollback: 5000,
        theme: { background: '#000000' },
      });
      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(termDiv);
      allFits.push(fit);

      const wsUrl = wsUrlFor(ifaceName);
      let ws, gen = 0;
      function connect() {
        const myGen = ++gen;
        statusEl.textContent = 'connecting…';
        statusEl.style.color = '#fa0';
        ws = new WebSocket(wsUrl);
        ws.binaryType = 'arraybuffer';
        ws.onopen = () => { statusEl.textContent = 'connected'; statusEl.style.color = '#0f0'; };
        ws.onmessage = ev => {
          if (ev.data instanceof ArrayBuffer) term.write(new Uint8Array(ev.data));
          else term.write(ev.data);
        };
        ws.onclose = () => {
          if (myGen !== gen) return;
          statusEl.textContent = 'unreachable — retrying';
          statusEl.style.color = '#f44';
          setTimeout(() => { if (myGen === gen) connect(); }, 3000);
        };
        ws.onerror = () => { try { ws.close(); } catch (e) {} };
      }
      term.onData(d => { if (ws && ws.readyState === WebSocket.OPEN) ws.send(d); });
      connect();
    }

    function buildPanes(ifaceNames) {
      serialEl.innerHTML = '';
      allFits.length = 0;

      if (ifaceNames.length <= 1) {
        // Single pane: global #sstatus, no per-pane label
        const termDiv = document.createElement('div');
        termDiv.className = 'pane-term';
        serialEl.appendChild(termDiv);
        openTerminal(ifaceNames[0] || null, termDiv, sst);
      } else {
        // Multi-pane: hide global status; each pane gets a label + status bar
        sst.style.display = 'none';
        for (const name of ifaceNames) {
          const pane = document.createElement('div');
          pane.className = 'serial-pane';

          const bar = document.createElement('div');
          bar.className = 'pane-bar';
          const nameEl = document.createElement('span');
          nameEl.className = 'pane-name';
          nameEl.textContent = name;
          const statusEl = document.createElement('span');
          statusEl.className = 'pane-status';
          bar.append(nameEl, statusEl);

          const termDiv = document.createElement('div');
          termDiv.className = 'pane-term';

          pane.append(bar, termDiv);
          serialEl.appendChild(pane);
          openTerminal(name, termDiv, statusEl);
        }
      }
      setTimeout(fitAll, 50);
    }

    if (singleInterface) {
      buildPanes([singleInterface]);
    } else {
      fetch(httpBase + '/interfaces')
        .then(r => r.json())
        .then(list => buildPanes(Array.isArray(list) ? list.map(i => i.name) : [null]))
        .catch(() => buildPanes([null]));
    }

    // ── KVM: keyboard + absolute mouse to the target via the hid daemon ──
    // ?hidws=URL (remote/tunnel) or ?hid=PORT (local) enable the HID leg. The
    // "Capture input" header button toggles capture; while engaged, all
    // keyboard + mouse events are sent to the target and suppressed locally
    // (click the button again to release). The mouse is absolute and the local
    // cursor stays visible (no pointer lock) — you point with it and the
    // target's cursor follows where you point inside the video, a frame behind.
    (function () {
      const hidWsUrl = params.get('hidws') ||
        (params.get('hid')
          ? 'ws://' + location.hostname + ':' + params.get('hid') + '/hid'
          : null);
      if (!hidWsUrl) return; // no HID channel on this console

      const ABS_MAX = 32767;
      const btn = document.getElementById('kvmbtn');
      const kst = document.getElementById('kvmstatus');
      const videoEl = document.getElementById('video');
      const feed = document.getElementById('feed');
      btn.style.display = 'inline-block'; // reveal the header toggle (CSS hides it by default)
      videoEl.classList.add('kvm-available'); // reveals the "Capture input" hint

      // event.code (physical key) -> adafruit_hid Keycode name.
      const KEYMAP = (function () {
        const m = {
          Enter: 'ENTER', Escape: 'ESCAPE', Backspace: 'BACKSPACE', Tab: 'TAB',
          Space: 'SPACE', Minus: 'MINUS', Equal: 'EQUALS',
          BracketLeft: 'LEFT_BRACKET', BracketRight: 'RIGHT_BRACKET',
          Backslash: 'BACKSLASH', Semicolon: 'SEMICOLON', Quote: 'QUOTE',
          Backquote: 'GRAVE_ACCENT', Comma: 'COMMA', Period: 'PERIOD',
          Slash: 'FORWARD_SLASH', CapsLock: 'CAPS_LOCK',
          ArrowRight: 'RIGHT_ARROW', ArrowLeft: 'LEFT_ARROW',
          ArrowUp: 'UP_ARROW', ArrowDown: 'DOWN_ARROW',
          Home: 'HOME', End: 'END', PageUp: 'PAGE_UP', PageDown: 'PAGE_DOWN',
          Insert: 'INSERT', Delete: 'DELETE', PrintScreen: 'PRINT_SCREEN',
          ControlLeft: 'LEFT_CONTROL', ShiftLeft: 'LEFT_SHIFT',
          AltLeft: 'LEFT_ALT', MetaLeft: 'LEFT_GUI', ShiftRight: 'RIGHT_SHIFT',
          AltRight: 'RIGHT_ALT', MetaRight: 'RIGHT_GUI',
        };
        const digits = ['ZERO', 'ONE', 'TWO', 'THREE', 'FOUR', 'FIVE', 'SIX',
                        'SEVEN', 'EIGHT', 'NINE'];
        for (let i = 0; i < 26; i++) m['Key' + String.fromCharCode(65 + i)] =
          String.fromCharCode(65 + i);
        for (let i = 0; i < 10; i++) m['Digit' + i] = digits[i];
        for (let i = 1; i <= 12; i++) m['F' + i] = 'F' + i;
        return m;
      })();

      // ── hid WebSocket ──
      let ws, gen = 0, wsOpen = false;
      function setStatus(txt, color) { kst.textContent = txt; kst.style.color = color || '#4d4'; }
      function connect() {
        const myGen = ++gen;
        ws = new WebSocket(hidWsUrl);
        ws.onopen = () => { wsOpen = true; };
        ws.onmessage = ev => {
          // The daemon broadcasts `evt ok|err <line> :: <reply>`; surface errors.
          const s = String(ev.data);
          if (s.startsWith('evt err') && captured)
            setStatus('capturing — ' + s.slice(8, 60), '#fa0');
        };
        ws.onclose = () => {
          wsOpen = false;
          if (myGen !== gen) return;
          if (captured) disengage();
          setTimeout(() => { if (myGen === gen) connect(); }, 3000);
        };
        ws.onerror = () => { try { ws.close(); } catch (e) {} };
      }
      function send(line) { if (ws && wsOpen) ws.send(line); }
      connect();

      // ── capture engage/disengage ──
      let captured = false;
      function engage() {
        captured = true;
        btn.classList.add('on');
        videoEl.classList.add('capturing');
        kst.style.display = '';
        setStatus('capturing — click ⌨ to release');
        btn.textContent = '⌨ Capturing';
      }
      function disengage() {
        captured = false;
        btn.classList.remove('on');
        videoEl.classList.remove('capturing');
        kst.style.display = 'none';
        btn.textContent = '⌨ Capture input';
        send('releaseall'); // don't leave modifiers stuck on the target
      }
      btn.onclick = () => (captured ? disengage() : engage());
      // Drop capture (and release held keys) if the window loses focus.
      window.addEventListener('blur', () => { if (captured) disengage(); });

      // ── keyboard ──
      window.addEventListener('keydown', ev => {
        if (!captured) return;
        ev.preventDefault();
        if (ev.repeat) return; // the target applies its own auto-repeat while held
        const name = KEYMAP[ev.code];
        if (name) send('down ' + name);
      }, true);
      window.addEventListener('keyup', ev => {
        if (!captured) return;
        ev.preventDefault();
        const name = KEYMAP[ev.code];
        if (name) send('up ' + name);
      }, true);

      // ── absolute mouse ──
      // Map a pointer position to the displayed-image rectangle. The <img> uses
      // object-fit: contain, so it is letterboxed inside its box; compute the
      // real content rect before scaling to the 0..ABS_MAX logical range.
      function toLogical(ev) {
        const r = feed.getBoundingClientRect();
        const natAR = feed.naturalWidth / feed.naturalHeight;
        if (!natAR || !r.width || !r.height) return null;
        const boxAR = r.width / r.height;
        let dispW, dispH, offX, offY;
        if (natAR > boxAR) { dispW = r.width; dispH = r.width / natAR; offX = 0; offY = (r.height - dispH) / 2; }
        else { dispH = r.height; dispW = r.height * natAR; offY = 0; offX = (r.width - dispW) / 2; }
        const x = ev.clientX - r.left - offX;
        const y = ev.clientY - r.top - offY;
        if (x < 0 || y < 0 || x > dispW || y > dispH) return null; // in the letterbox
        const clamp = v => Math.max(0, Math.min(ABS_MAX, Math.round(v)));
        return [clamp(x / dispW * ABS_MAX), clamp(y / dispH * ABS_MAX)];
      }
      const BTN = ['left', 'middle', 'right']; // MouseEvent.button order

      // Coalesce mouse moves: a fast mouse fires 60–125 mousemove/sec, and each
      // moveabs is a serial round-trip to the board — sending them all backs up
      // the queue and the target cursor lags. Instead keep only the *latest*
      // position and flush at most one per animation frame (~60 Hz). Clicks
      // flush immediately so the press lands where you clicked.
      let pendingMove = null;
      function flushMove() {
        if (captured && pendingMove) {
          send('moveabs ' + pendingMove[0] + ' ' + pendingMove[1]);
          pendingMove = null;
        }
        requestAnimationFrame(flushMove);
      }
      requestAnimationFrame(flushMove);
      function moveNow(p) { send('moveabs ' + p[0] + ' ' + p[1]); pendingMove = null; }

      // Mouse listeners live on the <img> itself, so events over the overlay
      // buttons (Capture/OCR/Power) are never forwarded to the target. Capture
      // is engaged only from the header button — clicking the video just sends
      // a real click where you point.
      feed.addEventListener('mousemove', ev => {
        if (!captured) return;
        const p = toLogical(ev);
        if (p) pendingMove = p; // newest position wins; flushed on the next frame
      });
      feed.addEventListener('mousedown', ev => {
        if (!captured) return;
        ev.preventDefault();
        const p = toLogical(ev);
        if (p) moveNow(p); // land the press exactly where clicked, not a frame late
        send('mdown ' + (BTN[ev.button] || 'left'));
      });
      window.addEventListener('mouseup', ev => {
        if (!captured) return;
        send('mup ' + (BTN[ev.button] || 'left'));
      });
      feed.addEventListener('contextmenu', ev => { if (captured) ev.preventDefault(); });
      feed.addEventListener('wheel', ev => {
        if (!captured) return;
        ev.preventDefault();
        send('scroll ' + (ev.deltaY < 0 ? 1 : -1));
      }, { passive: false });
    })();
  </script>
</body>
</html>
