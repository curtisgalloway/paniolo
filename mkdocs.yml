# Docs site for paniolo. Build/preview locally with:
#   uvx --with mkdocs-material mkdocs serve
# Deployed to GitHub Pages by .github/workflows/docs.yml.
#
# Design records (point-in-time design/decision docs, not end-user
# documentation) stay in docs/ for repo browsing but are excluded from the
# published site below.

site_name: paniolo
site_description: >-
  Agent-controlled target machine wrangler for low-level software
  development — netboot, serial, video+OCR, power, and HID control of a
  target board.
site_url: https://curtisgalloway.github.io/paniolo/
repo_url: https://github.com/curtisgalloway/paniolo
repo_name: curtisgalloway/paniolo
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy

exclude_docs: |
  config-redesign.md
  ch9329-spec.md
  distributed-control-plan.md
  uefi-http-boot-design.md

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: README.md
  - Architecture: architecture.md
  - Requirements & progress: requirements.md
  - Tested hardware: hardware.md
  - Subsystem guides:
      - Netboot: netboot.md
      - Link mode (netif): netif.md
      - Serial console: serial.md
      - Power control: power.md
      - Video + OCR: video.md
      - Dashboard: dashboard.md
      - HID injection: hid.md
      - HID serial protocol: hid-serial-protocol.md
      - adb (Android targets): adb.md
  - Distributed control: distributed-control.md
  - Hardware-CI integration:
      - Gap analysis: ci-integration/gap-analysis.md
      - Integration design: ci-integration/design.md
      - Related work: ci-integration/related-work.md
      - Redfish provider: ci-integration/redfish-provider.md
  - Contributing:
      - Adding power helpers: adding-power-helpers.md
