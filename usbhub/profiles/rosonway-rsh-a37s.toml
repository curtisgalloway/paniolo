# Rosonway RSH-A37S — 7-port USB 3 hub. Human-verified per-port VBUS switching.
#
# All 7 physical ports were verified controllable at the bench: a USB flash
# drive was plugged into each port in turn and confirmed to physically lose
# power when PORT_POWER was cleared (verified 2026-06-19).
#
# Internal topology: two cascaded Realtek hub chips. The root chip
# (0bda:0411 USB3 / 0bda:5411 USB2) carries physical ports 1-3; a second
# identical chip downstream of root port 4 carries physical ports 4-7.
#
# NOTE ON REUSE: usbhub resolves this profile by matching the chip cascade
# (vendor:product ids + internal port topology) against the live hub, so it
# applies to the same hub model. If a different hardware revision exposes
# different chips or numbering, re-run `usbhub learn` and re-verify. The
# `controllable` flags below are human assertions — trust them only as far as
# you trust the verification above; re-verify if in doubt.
#
# Copyright 2026 Curtis Galloway
