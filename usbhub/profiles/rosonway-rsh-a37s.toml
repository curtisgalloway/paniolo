# See http://www.apache.org/licenses/LICENSE-2.0

[model]
name = "rosonway-rsh-a37s"

[[chip]]
label = "root"
usb3_path = ""
usb3_id = "0bda:0411"
usb2_path = ""
usb2_id = "0bda:5411"

[[chip]]
label = "chip4"
usb3_path = "4"
usb3_id = "0bda:0411"
usb2_path = "4"
usb2_id = "0bda:5411"

[[port]]
physical = 1
controllable = true

[port.usb3]
path = ""
port = 1

[port.usb2]
path = ""
port = 1

[[port]]
physical = 2
controllable = true

[port.usb3]
path = ""
port = 2

[port.usb2]
path = ""
port = 2

[[port]]
physical = 3
controllable = true

[port.usb3]
path = ""
port = 3

[port.usb2]
path = ""
port = 3

[[port]]
physical = 4
controllable = true

[port.usb3]
path = "4"
port = 1

[port.usb2]
path = "4"
port = 1

[[port]]
physical = 5
controllable = true

[port.usb3]
path = "4"
port = 2

[port.usb2]
path = "4"
port = 2

[[port]]
physical = 6
controllable = true

[port.usb3]
path = "4"
port = 3

[port.usb2]
path = "4"
port = 3

[[port]]
physical = 7
controllable = true

[port.usb3]
path = "4"
port = 4

[port.usb2]
path = "4"
port = 4
